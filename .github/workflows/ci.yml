name: CI

on:
  push:
  pull_request:
    branches: [ "master", "main" ]
  merge_group:
  workflow_dispatch:

jobs:
  pr-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image and run PR fast-path guardrails
        run: docker compose run --rm app just pr-fast
