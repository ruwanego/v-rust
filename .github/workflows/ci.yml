name: CI

on:
  push:
  pull_request:
    branches: [ "master", "main" ]
  merge_group:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  pr-fast:
    # LLVM-free: Cranelift is the default backend. The LLVM parity lane
    # runs weekly in progress.yml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: extractions/setup-just@v2

      - uses: Swatinem/rust-cache@v2

      - name: Run PR fast-path guardrails
        run: just pr-fast
