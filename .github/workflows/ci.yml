name: CI

on:
  push:
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image and run green guardrails
        run: docker compose run --rm app just ci

      - name: Run vlib suite progress log
        continue-on-error: true
        run: docker compose run --rm app just vlib-full -- --nocapture

      - name: Run full official suite progress log
        continue-on-error: true
        run: docker compose run --rm app just official-full -- --nocapture
