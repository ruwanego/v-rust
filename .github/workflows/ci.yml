name: CI

on:
  push:
  pull_request:
    branches: [ "master", "main" ]
  merge_group:
  workflow_dispatch:

env:
  LLVM_SYS_150_PREFIX: /usr/lib/llvm-15
  CARGO_TERM_COLOR: always

jobs:
  pr-fast:
    # ubuntu-22.04: llvm-15 is packaged in jammy; keep in sync with Dockerfile
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM 15 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libclang-15-dev clang-15 \
            libzstd-dev zlib1g-dev

      - uses: extractions/setup-just@v2

      - uses: Swatinem/rust-cache@v2

      - name: Run PR fast-path guardrails
        run: just pr-fast
